replicaCount: 1

image:
  repository: kailima/titlis-operator
  tag: "latest"
  pullPolicy: IfNotPresent

namespace: titlis

# Operator behavior
operator:
  reconciliation:
    intervalSeconds: 300
    debounceSeconds: 30
  leaderElection:
    enabled: true
    namespace: "titlis"

# Kubernetes
kubernetes:
  namespace: "titlis-system"
  serviceAccountName: "titlis-operator"

# Logging
logging:
  level: "INFO"
  format: "json"

# Observability
observability:
  metricsEnabled: true
  tracingEnabled: false

# Todos os controllers desabilitados — apenas CAST AI Monitor ativo
controllers:
  scorecardEnabled: false
  sloEnabled: false
  autoRemediationEnabled: false

# CAST AI Monitor — único módulo habilitado neste chart
castai:
  monitorEnabled: true
  monitorNamespace: "castai-agent"
  monitorIntervalSeconds: 60
  clusterName: "develop"
  # Secret: titlis-castai-keys deve ter as chaves api-key e cluster-id
  costCacheTtlSeconds: 300
  costEnrichmentEnabled: false

# Datadog — necessário para envio de métricas do CAST AI
datadog:
  site: "datadoghq.com"
  secretName: "titlis-datadog-keys"

# External Secrets Operator — gera o secret titlis-datadog-keys automaticamente
externalSecret:
  enabled: false
  refreshInterval: "1h"
  secretStore:
    name: "cluster-secret-store"
    kind: ClusterSecretStore
  # Caminho no provider (ex: AWS SSM, Vault, GCP Secret Manager)
  # Ex AWS SSM:  /titlis/datadog
  # Ex Vault:    secret/data/titlis/datadog
  datadogPath: "/titlis/datadog"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  annotations: {}

rbac:
  create: true
