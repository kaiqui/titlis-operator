apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "castai-monitor.fullname" . }}-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "castai-monitor.fullname" . }}-clusterrole
subjects:
  - kind: ServiceAccount
    name: {{ include "castai-monitor.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
