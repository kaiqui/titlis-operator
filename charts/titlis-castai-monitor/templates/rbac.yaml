apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "castai-monitor.fullname" . }}-clusterrole
rules:
  # Leitura de pods para verificar saúde do castai-agent
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - events
    verbs: ["get", "list", "watch"]

  # ConfigMaps para o Kopf registrar estado interno
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Leitura de secrets (necessário para o Kopf e acesso a credenciais)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
