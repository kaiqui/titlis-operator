replicaCount: 1

image:
  repository: kailima/titlis-operator
  tag: "latest"
  pullPolicy: IfNotPresent

namespace: titlis

# Secrets and Datadog
secrets:
  datadogSecretName: titlis-datadog-keys # Secret must have api_key and app_key

# Operator behavior
operator:
  reconciliation:
    intervalSeconds: 300
    debounceSeconds: 30
  leaderElection:
    enabled: true
    namespace: "titlis"

# Kubernetes
kubernetes:
  namespace: "titlis-system"
  serviceAccountName: "titlis-operator"

# Logging
logging:
  level: "INFO"
  format: "json"

# Observability
observability:
  metricsEnabled: true
  tracingEnabled: false

# Controllers feature flags
controllers:
  scorecardEnabled: true
  sloEnabled: true
  autoRemediationEnabled: true

# Remediação — Feature flags de ações
remediation:
  enableResources: true
  enableHpa: true
  # Perfis de HPA
  hpaProfileDefault: "light"   # "light" ou "rigid"
  hpaProfileCritical: "rigid"
  # Detecção de criticidade via Datadog (requisições/30d)
  hpaCriticalThresholdRpm: 100000
  # Defaults de resources
  defaultCpuRequest: "100m"
  defaultCpuLimit: "500m"
  defaultMemoryRequest: "128Mi"
  defaultMemoryLimit: "512Mi"
  # HPA replicas e utilization
  hpaMinReplicas: 2
  hpaMaxReplicas: 10
  hpaCpuUtilization: 70
  hpaMemoryUtilization: 80
  # HPA behavior — scaleUp
  hpaBehaviorScaleUpStabilization: 0
  hpaBehaviorScaleUpPods: 4
  hpaBehaviorScaleUpPercent: 100
  hpaBehaviorScaleUpPeriod: 15
  # HPA behavior — scaleDown
  hpaBehaviorScaleDownStabilization: 300
  hpaBehaviorScaleDownPods: 1
  hpaBehaviorScaleDownPeriod: 60

# CAST AI Monitor
castai:
  monitorEnabled: false
  monitorNamespace: "castai-agent"
  monitorIntervalSeconds: 60
  clusterName: "develop"
  # Secrets: CASTAI_API_KEY and CASTAI_CLUSTER_ID must be in titlis-castai-keys secret
  costCacheTtlSeconds: 300
  costEnrichmentEnabled: false

# Backstage
backstage:
  url: ""
  cacheTtlSeconds: 300
  enrichmentEnabled: false
  # Secret: BACKSTAGE_TOKEN must be in titlis-backstage-keys secret

# GitHub integration (auto-remediation)
github:
  enabled: true
  repoOwner: ""
  repoName: ""
  baseBranch: "develop"
  timeoutSeconds: 30
  # Secret: GITHUB_TOKEN must be in titlis-github-keys secret

# Datadog
datadog:
  site: "datadoghq.com"
  secretName: "titlis-datadog-keys"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

# RBAC namespace scope (if you want to limit)
rbac:
  create: true
  targetNamespace: ""
