apiVersion: v1
kind: Service 
metadata:
  name: {{ include "titlis.fullname" . }}
  labels:
    {{- include "titlis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: {{ include "titlis.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}