apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-config" (include "titlis.fullname" .) | quote }}
  labels:
    app.kubernetes.io/name: {{ include "titlis.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  # Operator behavior
  RECONCILE_INTERVAL_SECONDS: "{{ default 300 .Values.operator.reconciliation.intervalSeconds }}"
  DEBOUNCE_SECONDS: "{{ default 30 .Values.operator.reconciliation.debounceSeconds }}"
  ENABLE_LEADER_ELECTION: "{{ default true .Values.operator.leaderElection.enabled }}"
  LEADER_ELECTION_NAMESPACE: "{{ default "titlis" .Values.operator.leaderElection.namespace }}"

  # Kubernetes
  KUBERNETES_NAMESPACE: "{{ default "titlis-system" .Values.kubernetes.namespace }}"
  SERVICE_ACCOUNT_NAME: "{{ default "titlis-operator" .Values.kubernetes.serviceAccountName }}"

  # Logging
  LOG_LEVEL: "{{ default "INFO" .Values.logging.level }}"
  LOG_FORMAT: "{{ default "json" .Values.logging.format }}"

  # Observability
  METRICS_ENABLED: "{{ default true .Values.observability.metricsEnabled }}"
  TRACING_ENABLED: "{{ default false .Values.observability.tracingEnabled }}"

  # Controllers feature flags
  ENABLE_SCORECARD_CONTROLLER: "{{ default true .Values.controllers.scorecardEnabled }}"
  ENABLE_SLO_CONTROLLER: "{{ default true .Values.controllers.sloEnabled }}"
  ENABLE_AUTO_REMEDIATION: "{{ default true .Values.controllers.autoRemediationEnabled }}"

  # CAST AI Monitor
  ENABLE_CASTAI_MONITOR: "{{ default false .Values.castai.monitorEnabled }}"
  CASTAI_MONITOR_NAMESPACE: "{{ default "castai-agent" .Values.castai.monitorNamespace }}"
  CASTAI_MONITOR_INTERVAL_SECONDS: "{{ default 60 .Values.castai.monitorIntervalSeconds }}"
  CASTAI_CLUSTER_NAME: "{{ default "develop" .Values.castai.clusterName }}"
  CASTAI_COST_CACHE_TTL_SECONDS: "{{ default 300 .Values.castai.costCacheTtlSeconds }}"
  ENABLE_CASTAI_COST_ENRICHMENT: "{{ default false .Values.castai.costEnrichmentEnabled }}"

  # Backstage
  BACKSTAGE_URL: "{{ default "" .Values.backstage.url }}"
  BACKSTAGE_CACHE_TTL_SECONDS: "{{ default 300 .Values.backstage.cacheTtlSeconds }}"
  ENABLE_BACKSTAGE_ENRICHMENT: "{{ default false .Values.backstage.enrichmentEnabled }}"

  # GitHub integration
  GITHUB_ENABLED: "{{ default true .Values.github.enabled }}"
  GITHUB_REPO_OWNER: "{{ default "" .Values.github.repoOwner }}"
  GITHUB_REPO_NAME: "{{ default "" .Values.github.repoName }}"
  GITHUB_BASE_BRANCH: "{{ default "develop" .Values.github.baseBranch }}"
  GITHUB_TIMEOUT_SECONDS: "{{ default 30 .Values.github.timeoutSeconds }}"

  # Datadog
  DD_SITE: "{{ default "datadoghq.com" .Values.datadog.site }}"
  DD_SECRET_NAME: "{{ default "titlis-datadog-keys" .Values.datadog.secretName }}"
